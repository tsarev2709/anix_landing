    <script>
      (function retireLegacyWorker() {
        if (!("serviceWorker" in navigator)) return;

        var reloadKey = "anix-sw-retired-v1";
        var cleanupCaches = "caches" in window
          ? caches.keys().then(function (keys) {
              return Promise.all(
                keys
                  .filter(function (key) { return key.indexOf("anix-cache-") === 0; })
                  .map(function (key) { return caches.delete(key); })
              );
            })
          : Promise.resolve();

        Promise.all([
          navigator.serviceWorker.getRegistrations().then(function (registrations) {
            return Promise.all(registrations.map(function (registration) {
              return registration.unregister();
            }));
          }),
          cleanupCaches,
        ]).then(function () {
          if (navigator.serviceWorker.controller && sessionStorage.getItem(reloadKey) !== "1") {
            sessionStorage.setItem(reloadKey, "1");
            window.location.reload();
          }
        }).catch(function () {});
      })();
    </script>

    <script>
      // Belt-and-suspenders visible error reporting: works even if the app
      // bundle itself fails to load (a plain React error boundary can't
      // catch that), so a broken deploy shows a message instead of a blank
      // page with the real cause only in devtools.
      window.__hseMvpErrorShown = false;
      window.__hseMvpRenderError = function (error) {
        if (window.__hseMvpErrorShown) return;
        window.__hseMvpErrorShown = true;
        var message =
          error && error.stack ? error.stack : String(error && error.message ? error.message : error);
        var container = document.createElement('div');
        container.style.cssText =
          'position:fixed;inset:0;background:#fff;color:#111;padding:24px;overflow:auto;z-index:999999;font-family:sans-serif;';
        var title = document.createElement('h1');
        title.style.cssText = 'font-size:18px;margin:0 0 12px;';
        title.textContent = 'Ошибка загрузки страницы';
        var pre = document.createElement('pre');
        pre.style.cssText = 'white-space:pre-wrap;font-size:13px;';
        pre.textContent = message;
        container.appendChild(title);
        container.appendChild(pre);
        document.body.appendChild(container);
      };
      window.addEventListener('error', function (event) {
        window.__hseMvpRenderError(event.error || event.message);
      });
      window.addEventListener('unhandledrejection', function (event) {
        window.__hseMvpRenderError(event.reason);
      });
    </script>
