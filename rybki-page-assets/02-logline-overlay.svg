<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" version="1.1">
  <defs>
    <style><![CDATA[
      .title { font-family: 'Jura','Exo 2','Raleway','Arial',sans-serif; font-weight: 200; letter-spacing: 8px; fill: #f5f7f7; }
      .body { font-family: 'Jura','Exo 2','Raleway','Arial',sans-serif; font-weight: 300; letter-spacing: 1.2px; fill: #e7eeee; }
      .meta { font-family: 'Jura','Exo 2','Raleway','Arial',sans-serif; font-weight: 300; letter-spacing: 7px; fill: #dfe8e8; }
      .cyan { fill: #66e7ec; stroke: #66e7ec; }
      .line { stroke: #66e7ec; stroke-width: 2.3; opacity: .9; }
      .thin { stroke: #74eaf0; stroke-width: 1.1; fill: none; opacity: .58; }
    ]]></style>
    <linearGradient id="leftPanel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#06121a" stop-opacity="0.98"/>
      <stop offset="0.68" stop-color="#06121a" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#06121a" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#06121a" stop-opacity="0"/>
      <stop offset="1" stop-color="#06121a" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  

  <g id="02_left_readability_panel">
    <rect x="0" y="0" width="890" height="1080" fill="url(#leftPanel)"/>
    <rect x="0" y="760" width="1920" height="320" fill="url(#bottomFade)"/>
  </g>

