name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install PDF renderer
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install deps
        id: npm-install
        run: npm install

      - name: Fix npm binary permissions
        if: steps.npm-install.outcome == 'success'
        run: chmod +x node_modules/.bin/* || true

      - name: Lint
        if: steps.npm-install.outcome == 'success'
        run: npm run lint
        continue-on-error: true

      - name: Notify if install failed
        if: steps.npm-install.outcome == 'failure'
        run: echo "npm install failed"

      - name: Render Rybki slide previews
        if: steps.npm-install.outcome == 'success'
        run: node scripts/render-rybki-pdf-slides.js

      - name: Build and verify static SEO
        if: steps.npm-install.outcome == 'success'
        env:
          REACT_APP_SUBMIT_LEAD_URL: ${{ secrets.REACT_APP_SUBMIT_LEAD_URL }}
          REACT_APP_TRACK_EVENT_URL: ${{ secrets.REACT_APP_TRACK_EVENT_URL }}
          REACT_APP_TURNSTILE_SITE_KEY: ${{ secrets.REACT_APP_TURNSTILE_SITE_KEY }}
          REACT_APP_SUPABASE_ANON_KEY: ${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}
          CI: false
        run: npm run build

      - name: Deploy to gh-pages
        if: steps.npm-install.outcome == 'success'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
          cname: studio.anix-ai.pro
